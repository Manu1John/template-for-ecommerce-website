<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link href="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
<script src="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel='stylesheet' href='/adminlogin.css' />
</head>
<body>
<div class="wrapper fadeInDown">
  <div id="formContent">
    <!-- Tabs Titles -->

    <!-- Icon -->
    <div class="fadeIn first">
    <h1 class="lead"> Login</h1>
    </div>

    <!-- Login Form -->
    <form action="/dashboard" method="post">
      <input type="text" id="login" 
      name="username" placeholder="Username"
       required  class="fadeIn second my-login-input"
           pattern=".*\S.*" autocomplete="off"
    title="Username cannot be empty or contain only spaces">
      <input type="password" id="password"
       name="password" placeholder="Password"
         class="fadeIn third my-login-input"
            pattern=".*\S.*" autocomplete="off"
    title="Password cannot be empty or contain only spaces" >
    <a href=""></a>
    <label for="">Show password
    <input id="toggleIcon" type="checkbox" class="fa fa-eye" onclick="togglePasswordVisibility()"></i>
    </label>
      <input type="submit" class="fadeIn fourth" value="Log In">
    </form>
  </div>
</div>
<script>
  function togglePasswordVisibility(){
    const passwordField = document.getElementById("password")
    if(passwordField.type === "password"){
      passwordField.type = "text"
    }else{
      passwordField.type = "password"
    }

  }
</script>

</body>
</html>
