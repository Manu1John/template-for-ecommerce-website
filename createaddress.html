
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookSaw - Create Address</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prata&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8f8f6;
      color: #222;
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: auto;
    }

    /* TOPBAR */

    .topbar {
      background: #fff;
      border-bottom: 1px solid #ececec;
      padding: 12px 0;
      font-size: 14px;
    }

    .topbar-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .social-icons,
    .top-links {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .social-icons a:hover,
    .top-links a:hover {
      color: #b8995f;
      transition: 0.3s ease;
    }

    /* NAVBAR */

    .navbar {
      background: #fff;
      padding: 25px 0;
      border-bottom: 1px solid #efefef;
    }

    .navbar-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-family: 'Prata', serif;
      font-size: 42px;
      letter-spacing: 2px;
    }

    .nav-links {
      display: flex;
      gap: 35px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .nav-links a {
      transition: 0.3s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #b8995f;
    }

    /* HERO */

    .hero {
      background: linear-gradient(to right, #f5f2e7, #faf7ee, #f5f2e7);
      padding: 60px 0;
      text-align: center;
    }

    .hero small {
      display: block;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 15px;
      color: #666;
      font-weight: 600;
    }

    .hero h1 {
      font-family: 'Prata', serif;
      font-size: 52px;
      font-weight: 400;
      position: relative;
      display: inline-block;
      text-transform: uppercase;
      padding: 0 40px;
    }

    .hero h1::before,
    .hero h1::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 160px;
      height: 1px;
      background: #8f8f8f;
    }

    .hero h1::before {
      left: -170px;
    }

    .hero h1::after {
      right: -170px;
    }

    /* ADDRESS SECTION */

    .address-section {
      padding: 80px 0;
      background: #fff;
    }

    .address-wrapper {
      max-width: 900px;
      margin: auto;
      background: #faf8f2;
      border: 1px solid #ece6d9;
      padding: 50px;
    }

    .section-title {
      font-family: 'Prata', serif;
      font-size: 38px;
      margin-bottom: 10px;
      text-align: center;
    }

    .section-subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-group label {
      margin-bottom: 10px;
      font-weight: 600;
      color: #444;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 15px;
      outline: none;
      transition: 0.3s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #b8995f;
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    .checkbox-group input {
      width: 18px;
      height: 18px;
      accent-color: #b8995f;
    }

    .button-group {
      display: flex;
      gap: 20px;
      margin-top: 35px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      padding: 15px 35px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.3s ease;
      text-transform: uppercase;
    }

    .btn-primary {
      background: #b8995f;
      color: #fff;
    }

    .btn-primary:hover {
      background: #947544;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #b8995f;
      color: #b8995f;
    }

    .btn-outline:hover {
      background: #b8995f;
      color: #fff;
    }

    /* FOOTER */

    footer {
      background: #f5f3ea;
      padding: 70px 0 30px;
      margin-top: 60px;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px;
      margin-bottom: 50px;
    }

    .footer-title {
      font-family: 'Prata', serif;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .footer-column h4 {
      margin-bottom: 18px;
      font-size: 18px;
    }

    .footer-column p,
    .footer-column a {
      color: #555;
      margin-bottom: 10px;
      display: block;
    }

    .newsletter {
      display: flex;
      margin-top: 15px;
      overflow: hidden;
      border: 1px solid #ddd;
    }

    .newsletter input {
      flex: 1;
      border: none;
      padding: 14px;
      outline: none;
    }

    .newsletter button {
      border: none;
      background: #b8995f;
      color: #fff;
      padding: 0 25px;
      font-weight: 600;
      cursor: pointer;
    }

    .footer-social {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    .footer-social a {
      width: 40px;
      height: 40px;
      background: #222;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: 0.3s ease;
    }

    .footer-social a:hover {
      background: #b8995f;
    }

    .copyright {
      border-top: 1px solid #ddd;
      padding-top: 20px;
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    /* RESPONSIVE */

    @media (max-width: 992px) {

      .hero h1::before,
      .hero h1::after {
        display: none;
      }

      .hero h1 {
        font-size: 40px;
      }

      .footer-grid {
        grid-template-columns: repeat(2, 1fr);
      }

    }

    @media (max-width: 768px) {

      .topbar-wrapper,
      .navbar-wrapper {
        flex-direction: column;
        text-align: center;
      }

      .nav-links {
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
      }

      .form-grid,
      .footer-grid {
        grid-template-columns: 1fr;
      }

      .address-wrapper {
        padding: 30px 25px;
      }

      .hero h1 {
        font-size: 30px;
        padding: 0;
      }

      .section-title {
        font-size: 30px;
      }

      .button-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

    }

  </style>
</head>
<body>

  <!-- TOPBAR -->


  </div>

  <!-- NAVBAR -->

  <nav class="navbar">
    <div class="container navbar-wrapper">

      <div class="logo">BOOKSAW</div>

      <div class="nav-links">
        <a href="profile.html">Account</a>
        <a href="index.html">Home</a>
        <a href="order-history.html">Orders</a>
        <a href="addressList.html" class="active">Address</a>
        <a href="#">Contact</a>
        <a href="cart.html">Cart</a>
      </div>

    </div>
  </nav>

  <!-- HERO -->

  <section class="hero">
    <div class="container">
      <small>User Dashboard</small>
      <h1>Create Address</h1>
    </div>
  </section>

  <!-- ADDRESS FORM -->

  <section class="address-section">

    <div class="container">

      <div class="address-wrapper">

        <h2 class="section-title">Add New Address</h2>
        <p class="section-subtitle">
          Fill in your shipping and billing address details below.
        </p>

        <form action="addressList.html">

          <div class="form-grid">

            <div class="form-group">
              <label>First Name</label>
              <input type="text" placeholder="Enter first name">
            </div>

            <div class="form-group">
              <label>Last Name</label>
              <input type="text" placeholder="Enter last name">
            </div>

            <div class="form-group">
              <label>Email Address</label>
              <input type="email" placeholder="Enter email address">
            </div>

            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" placeholder="Enter phone number">
            </div>

            <div class="form-group full-width">
              <label>Street Address</label>
              <textarea placeholder="Enter complete address"></textarea>
            </div>

            <div class="form-group">
              <label>Country</label>
              <select>
                <option>Select Country</option>
                <option>United States</option>
                <option>United Kingdom</option>
                <option>India</option>
                <option>Canada</option>
              </select>
            </div>

            <div class="form-group">
              <label>State / Region</label>
              <input type="text" placeholder="Enter state or region">
            </div>

            <div class="form-group">
              <label>City</label>
              <input type="text" placeholder="Enter city">
            </div>

            <div class="form-group">
              <label>Postal Code</label>
              <input type="text" placeholder="Enter postal code">
            </div>

            <div class="form-group full-width">
              <div class="checkbox-group">
                <input type="checkbox" id="defaultAddress">
                <label for="defaultAddress">
                  Set as default shipping address
                </label>
              </div>
            </div>

          </div>

          <div class="button-group">
            <button type="submit" class="btn btn-primary">
              Save Address
            </button>

            <button type="reset" class="btn btn-outline">
              Cancel
            </button>
          </div>

        </form>

      </div>

    </div>

  </section>

  <!-- FOOTER -->

  <footer>

    <div class="container">

      <div class="footer-grid">

        <div class="footer-column">
          <div class="footer-title">BOOKSAW</div>

          <p>Contact Info</p>
          <p>+523 455-7890</p>
          <p>info@booksaw.com</p>
          <p>support@booksaw.com</p>
        </div>

        <div class="footer-column">
          <h4>Quick Links</h4>

          <a href="#">About</a>
          <a href="#">Books</a>
          <a href="#">Blog</a>
          <a href="#">Contact</a>
        </div>
    </div>






  </footer>

</body>
</html>
```
